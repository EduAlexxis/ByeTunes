name: Build unsigned ByeTunes IPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

concurrency:
  group: unsigned-ios-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  PROJECT_FILE: MusicManager.xcodeproj
  SCHEME: MusicManager
  APP_DIR: MusicManager
  CONFIGURATION: Release
  CI: true

jobs:
  build-unsigned-ipa:
    name: Build unsigned device IPA
    runs-on: macos-15
    timeout-minutes: 30

    permissions:
      contents: write
      actions: read
      checks: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clean stale generated files
        shell: bash
        run: |
          rm -f "$APP_DIR"/*.o
          rm -f "$APP_DIR"/Bridging-Header.h
          rm -f "$APP_DIR"/idevice.h
          rm -f "$APP_DIR"/libidevice_ffi.a
          git checkout -- "$APP_DIR"/Bridging-Header.h 2>/dev/null || true

      - name: Select Xcode
        id: setup-xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Verify environment
        shell: bash
        run: |
          echo "macOS: $(sw_vers -productVersion)"
          echo "Arch: $(uname -m)"
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks | grep -E 'iphoneos|iOS'

      - name: Install Rust iOS target
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: byetunes-idevice-ffi-v1
          workspaces: |
            ${{ runner.temp }}/idevice

      - name: Build idevice-ffi static library
        id: build-idevice
        shell: bash
        run: |
          set -euo pipefail

          DEST_DIR="$GITHUB_WORKSPACE/$APP_DIR"

          if [[ -f "$DEST_DIR/idevice.h" && -f "$DEST_DIR/libidevice_ffi.a" ]]; then
            echo "Using cached idevice artifacts"
            ls -la "$DEST_DIR"/idevice.h "$DEST_DIR"/libidevice_ffi.a
          else
            echo "Building idevice-ffi from source..."
            rm -rf "$RUNNER_TEMP/idevice"
            git clone --depth 1 https://github.com/jkcoxson/idevice "$RUNNER_TEMP/idevice"

            cd "$RUNNER_TEMP/idevice"
            export IPHONEOS_DEPLOYMENT_TARGET=16.0
            export RUSTFLAGS="-C opt-level=3 -C lto=fat"

            cargo build --release --package idevice-ffi --target aarch64-apple-ios 2>&1 | tail -20

            HEADER_PATH="$(find . -name 'idevice.h' -type f | head -n 1)"
            LIB_PATH="$(find target -path '*aarch64-apple-ios/release/libidevice_ffi.a' -type f | head -n 1)"

            if [[ -z "$HEADER_PATH" || -z "$LIB_PATH" ]]; then
              echo "ERROR: idevice build artifacts not found"
              find target -name "*.a" -type f 2>/dev/null || true
              exit 1
            fi

            cp -v "$HEADER_PATH" "$DEST_DIR/idevice.h"
            cp -v "$LIB_PATH" "$DEST_DIR/libidevice_ffi.a"

            echo "idevice-ffi built successfully"
            ls -la "$DEST_DIR"/libidevice_ffi.a "$DEST_DIR"/idevice.h
          fi

          cat > "$GITHUB_WORKSPACE/$APP_DIR/Bridging-Header.h" <<'EOF'
#import "idevice.h"
EOF

          cat "$GITHUB_WORKSPACE/$APP_DIR/Bridging-Header.h"

      - name: Verify project integrity
        id: verify-project
        shell: bash
        run: |
          set -euo pipefail
          echo "Schemes:"
          xcodebuild -project "$PROJECT_FILE" -list

          echo "Swift files: $(find "$APP_DIR" -name '*.swift' | wc -l)"
          echo "Headers: $(find "$APP_DIR" -name '*.h' | wc -l)"
          echo "Libraries: $(find "$APP_DIR" -name '*.a' | wc -l)"

          if grep -q '<<<<<<<\|=======\|>>>>>>>' "$APP_DIR"/*.swift 2>/dev/null; then
            echo "ERROR: Merge conflict markers found in Swift files"
            grep -l '<<<<<<<\|=======\|>>>>>>>' "$APP_DIR"/*.swift
            exit 1
          fi

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-data-${{ github.ref }}-${{ hashFiles('MusicManager.xcodeproj/project.pbxproj', 'MusicManager/**/*.swift') }}
          restore-keys: |
            derived-data-${{ github.ref }}-
            derived-data-

      - name: Build unsigned IPA
        id: xcode-build
        shell: bash
        run: |
          set -euo pipefail

          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          rm -rf "$DERIVED_DATA"
          mkdir -p "$DERIVED_DATA"

          # Build with detailed logs
          xcodebuild \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            -allowProvisioningUpdates \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            build \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild.log" | grep -E '(error:|warning:|BUILD|===|CompileSwift|Ld|CpResource|Generate)' || true

          BUILD_RESULT=${PIPESTATUS[0]}

          if [[ $BUILD_RESULT -ne 0 ]]; then
            echo "BUILD FAILED (exit $BUILD_RESULT)"
            echo "--- Last 80 lines of build log ---"
            tail -n 80 "$RUNNER_TEMP/xcodebuild.log"
            exit 1
          fi

          echo "BUILD SUCCEEDED"

          # Find the .app bundle
          APP_PATH="$(find "$DERIVED_DATA" -name '*.app' -type d | head -n 1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "ERROR: No .app bundle found in DerivedData"
            find "$DERIVED_DATA" -type d | head -30
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found app: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Package IPA
        id: package-ipa
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_PATH="$GITHUB_WORKSPACE/ci-artifacts"
          mkdir -p "$ARTIFACT_PATH"

          # Create Payload directory
          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"

          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          APP_NAME="$(basename "$APP_PATH")"

          # Strip code signing
          rm -rf "$PAYLOAD_DIR/$APP_NAME/_CodeSignature" 2>/dev/null || true
          rm -f "$PAYLOAD_DIR/$APP_NAME/embedded.mobileprovision" 2>/dev/null || true

          # Remove incompatible simulator slices if any slipped in
          BINARY_PATH="$PAYLOAD_DIR/$APP_NAME/$SCHEME"
          if [[ -f "$BINARY_PATH" ]]; then
            echo "Binary architectures:"
            lipo -info "$BINARY_PATH" || true
          fi

          # Create IPA using ditto for proper resource forks
          ditto -c -k --sequesterRsrc --keepParent "$PAYLOAD_DIR" "$ARTIFACT_PATH/ByeTunes-unsigned.ipa"

          echo "IPA created:"
          ls -lh "$ARTIFACT_PATH/ByeTunes-unsigned.ipa"
          du -sh "$ARTIFACT_PATH/ByeTunes-unsigned.ipa"

          # Save build log
          cp "$RUNNER_TEMP/xcodebuild.log" "$ARTIFACT_PATH/"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ByeTunes-unsigned-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ci-artifacts/ByeTunes-unsigned.ipa
            ci-artifacts/xcodebuild.log
          if-no-files-found: warn
          retention-days: 14

      - name: Build summary
        if: always()
        shell: bash
        run: |
          IPA_SIZE=""
          if [[ -f "ci-artifacts/ByeTunes-unsigned.ipa" ]]; then
            IPA_SIZE="$(du -sh ci-artifacts/ByeTunes-unsigned.ipa | cut -f1)"
          fi

          echo "## ByeTunes Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Xcode selection | ${{ steps.setup-xcode.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rust toolchain | ${{ steps.rust-toolchain.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build idevice-ffi | ${{ steps.build-idevice.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify project | ${{ steps.verify-project.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Xcode build | ${{ steps.xcode-build.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package IPA | ${{ steps.package-ipa.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "$IPA_SIZE" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Artifact" >> "$GITHUB_STEP_SUMMARY"
            echo "- **IPA Size**: $IPA_SIZE" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Attach IPA to release
        if: github.event_name == 'release' && success()
        uses: softprops/action-gh-release@v2
        with:
          files: ci-artifacts/ByeTunes-unsigned.ipa
